<!DOCTYPE html>
<html>
  <head>
    <title>Linkdin</title>
    <style>
      .tbo{
        width: 350px; 
        height:30px;
        border-width: 1.5px;
        border-radius: 4px;
      }
      p{
        font-family: arial;
        color: rgb(101, 100, 100);
        font-size: 14px;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .po{
        margin-bottom: 8px;
      }
      .pt{
        margin-top: 20px;
        margin-bottom: 20px;
      }
      .buto{
       width: 350px;
       height:50px;
       color: white;
       background-color: rgb(16, 110, 192);
       font-family: arial;
       border-style: none;
       border-radius: 50px ;
       font-size: 18px;
       cursor: pointer;
      }
    </style>
  </head>
  <body>
    <p class="po">Email</p>
    <input class="tbo" type="textbox">
    <p class="pt">By clicking Agree & Join, you agree to the Privacy Policy.</p>
    <button class="buto">Agree & Join</button>
  </body>
</html>
