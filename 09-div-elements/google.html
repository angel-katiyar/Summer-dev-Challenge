<!DOCTYPE html>
<html>
  <head>
    <title>Google</title>
    <style>
      .one{
        text-align: center;
      }
      .img{
        width: 150px;
        height: 50px;
      }
      .two{
        text-align: center;
        margin-bottom: 25px;
      }
      .tb{
        width: 350px;
        height:25px;
        box-shadow: 0px 1px 6px rgba(0,0,0,0.2);
        border: none;
        border-radius: 25px;
        font-size: 12px;
        padding-left: 12px;
      }
      .three{
        text-align: center;
      }
      .to{
        background-color: rgb(237, 236, 236);
        border-style: none;
        height: 25px;
        width: 100px;
        font-size: 12px;
        margin-right: 8px;
      }
      .tt{
        background-color: rgb(237, 236, 236);
        border-style: none;
        height: 25px;
        width: 120px;
        font-size: 12px;
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="one">
      <img class="img" src="thumbnails/thmb.png">
    </div>
    <div class="two">
      <input class="tb" type="textbox" placeholder="Search Google or type a URL">
    </div>
    <div class="three">
      <button class="to">Google Search</button>
      <button class="tt">I'm Feeling Lucky</button>
    </div>
  </body>
</html>
