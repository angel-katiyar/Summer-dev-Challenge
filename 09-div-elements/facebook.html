<!DOCTYPE html>
<html>
  <head>
    <title>Facebook</title>
    <style>
      .ex{
        width:150px;
        box-shadow: 0px 1px 6px rgba(0,0,0,0.2);
        padding-bottom: 10px;
        display: inline-block;
        margin-right: 10px;
      }
      .img{
        width:150px;
        height:150px;
      }
      .name{
        font-weight: bold;
        font-size: 13px;
        margin-top: 5px;
        margin-bottom: 3px;
        margin-left: 5px;
        font-family: arial;
      }
      .fds{
        color: gray;
        font-size: 12px;
        margin-top: 0px;
        margin-left:5px;
        font-family: arial;
      }
      .add{
        background-color: rgb(2, 118, 234);
        color: white;
        border-style: none;
        height:30px;
        width: 95px;
        border-radius: 5px;
        margin-left:8px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="ex">
      <img class="img" src="thumbnails/thmb2.jpg">
      <p class="name">Angel</p>
      <p class="fds">2 mutual friends</p>
      <button class="add">Add Friend</button>
    </div>
     <div class="ex">
      <img class="img" src="thumbnails/thmb3.jpg">
      <p class="name">Dora</p>
      <p class="fds">3 mutual friends</p>
      <button class="add">Add Friend</button>
    </div>
     <div class="ex">
      <img class="img" src="thumbnails/thmb4.jpg">
      <p class="name">Pagoll</p>
      <p class="fds">4 mutual friends</p>
      <button class="add">Add Friend</button>
    </div>
  </body>
</html>
