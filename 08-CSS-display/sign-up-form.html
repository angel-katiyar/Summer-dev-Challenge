<!DOCTYPE html>
<html>
  <head>
    <title>Sign Up</title>
    <style>
      .oo{
        margin-right: 1px;
        width: 100px;
        height: 25px;
        border-radius: 5px;
        border-width: 1px;
        margin-bottom: 5px;
        padding-left: 7px;
        font-size: 13px;
      }
      .ot{
        margin-right: 5px;
        width: 100px;
        height: 25px;
        border-radius: 5px;
        border-width: 1px;
        margin-bottom: 10px;
        padding-left: 7px;
        font-size: 13px;
      }
      .to{
        display: block;
        width:217px ;
        border-radius: 5px;
        border-width: 1px;
        height: 25px;
        padding-left: 7px;
        margin-bottom: 10px;
        font-size: 13px;
      }
      .t{
        width: 230px;
        border-radius: 5px;
        background-color: rgb(15, 118, 197);
        color: white;
        height:35px;
        font-size: 13px;
        border-style: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <input class="oo" type="textbox" placeholder="First name">
    <input class="ot" type="textbox" placeholder="Last name">
    <input class="to" type="textbox" placeholder="Email">
    <button class="t">Sign Up</button>
  </body>
</html>
