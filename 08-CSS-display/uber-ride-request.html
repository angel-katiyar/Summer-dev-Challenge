<!DOCTYPE html>
<html>
  <head>
    <title>Uber</title>
    <style>
      .one{
        font-family: arial;
        font-size: 25px; 
        margin-bottom: 20px;
      }
      .two{
        display: block;
        background-color: rgb(239, 238, 238);
        margin-bottom: 5px;
        border-style: none;
        width: 250px;
        height: 30px;
        font-size: 10px;
        padding-left: 10px;
        border-radius: 5px;
      }
      .three{
        display: block;
        background-color: rgb(239, 238, 238);
        margin-bottom: 23px;
        border-style: none;
        width: 250px;
        height: 30px;
        font-size: 10px;
        padding-left: 10px;
        border-radius: 5px;
      }
      .bo{
        background-color: black;
        color: white;
        width:100px;
        height:25px;
        font-size: 10px;
        border-style: none;
        margin-right: 12px;
      }
      .bt{
        color:black;
        background-color: rgb(239,238,238);
        font-size:10px ;
        width: 100px;
        border-style: none;
        height: 25px;
      }
    </style>
  </head>
  <body>
    <p class="one">Request a ride now</p>
    <input class="two" type="textbox" placeholder="Enter pickup location">
    <input class="three" type="textbox" placeholder="Enter destination">
    <button class="bo">Request now</button>
    <button class="bt">Schedule for later</button>
  </body>
</html>
